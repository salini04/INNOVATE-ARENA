<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Calculators - Heart Health Hub</title>
    <style>
        :root {
            --c1: #B2A6BE;
            --c2: #555184;
            --c3: #19788d;
            --c4: #28293D;
            --white:#fff;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3));
            background-size: 400% 400%;
            animation: bgMove 10s infinite;
            color: white;
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        header {
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab:hover {
            background: var(--c3);
        }

        .active {
            background: var(--c4);
            color: black;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: var(--c3);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--c4);
            color: black;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .bar {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .fill {
            height: 100%;
            width: 0%;
            transition: 1s;
        }

        @media(max-width:600px) {
            .tabs {
                flex-direction: column;
                gap: 10px;
            }
        }

        .result-box {
            margin-top: 20px;
            text-align: center;
        }

        .circle {
            width: 130px;
            height: 130px;
            margin: auto;
            position: relative;
        }

        svg {
            width: 130px;
            height: 130px;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 10;
            stroke: #333;
            r: 50;
            cx: 60;
            cy: 60;
        }

        #calCircle {
            stroke: #00ffcc;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: 1s;
        }

        .number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
        }

        .meal-cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .meal {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px;
            border-radius: 10px;
            min-width: 120px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>❤️ Health Calculators</h1>
        <p>Track your fitness & heart health instantly</p>
    </header>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab(0)">BMI</div>
            <div class="tab" onclick="showTab(1)">Heart Risk</div>
            <div class="tab" onclick="showTab(2)">Calories</div>
            <div class="tab" onclick="showTab(3)">Water</div>
        </div>
        <div class="card section">
            <h2>BMI Calculator</h2>
            <input id="w" placeholder="Weight (kg)">
            <input id="h" placeholder="Height (cm)">
            <button onclick="bmi()">Calculate BMI</button>
            <div class="result" id="bmiR"></div>
        </div>
        <div class="card section" style="display:none">
            <h2>Heart Risk Assessment</h2>
            <input id="age" placeholder="Age">
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
            </select>
            <select id="smoke">
                <option value="yes">Smoker</option>
                <option value="no">Non-Smoker</option>
            </select>
            <input id="bp" placeholder="Blood Pressure">
            <input id="chol" placeholder="Cholesterol Level">
            <select id="diabetes">
                <option value="yes">Diabetes</option>
                <option value="no">No Diabetes</option>
            </select>
            <button onclick="risk()">Check Risk</button>
            <div class="result" id="riskR"></div>
            <div class="bar">
                <div class="fill" id="riskBar"></div>
            </div>
        </div>
        <div class="card section" style="display:none">
            <h2>🔥 Smart Calorie Planner</h2>
            <input id="cAge" placeholder="Age">
            <select id="genderC">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <select id="activity">
                <option value="1.2">Sedentary (Little activity)</option>
                <option value="1.5">Moderate (Light exercise)</option>
                <option value="1.8">Active (Daily workout)</option>
            </select>
            <select id="goal">
                <option value="maintain">Maintain Weight</option>
                <option value="lose">Lose Weight</option>
                <option value="gain">Gain Weight</option>
            </select>
            <button onclick="calories()">Generate Plan</button>
            <div class="result-box">
                <div class="circle">
                    <svg>
                        <circle cx="60" cy="60" r="50"></circle>
                        <circle cx="60" cy="60" r="50" id="calCircle"></circle>
                    </svg>
                    <div class="number" id="calValue">0</div>
                </div>
                <div class="result" id="calR"></div>
                <div class="meal-cards" id="meals"></div>
            </div>
        </div>
        <div class="card section" style="display:none">
            <h2>Water Intake</h2>
            <input id="wAge" placeholder="Age">
            <button onclick="water()">Calculate</button>
            <div class="result" id="waterR"></div>
        </div>
    </div>
    <script>
        function showTab(n) {
            let tabs = document.querySelectorAll(".section");
            let btns = document.querySelectorAll(".tab");
            tabs.forEach(t => t.style.display = "none");
            btns.forEach(b => b.classList.remove("active"));
            tabs[n].style.display = "block";
            btns[n].classList.add("active");
        }
        function bmi() {
            let w = document.getElementById("w").value;
            let h = document.getElementById("h").value / 100;
            let val = (w / (h * h)).toFixed(1);
            let msg = "";
            if (val < 18.5) msg = "Underweight";
            else if (val < 24.9) msg = "Normal";
            else if (val < 29.9) msg = "Overweight";
            else msg = "Obese";
            document.getElementById("bmiR").innerHTML = `BMI: ${val} (${msg})`;
        }
        function risk() {
            let age = +document.getElementById("age").value;
            let smoke = document.getElementById("smoke").value;
            let chol = +document.getElementById("chol").value;
            let diabetes = document.getElementById("diabetes").value;
            let score = 0;
            if (age > 50) score += 2;
            if (smoke == "yes") score += 2;
            if (chol > 200) score += 2;
            if (diabetes == "yes") score += 2;
            let level = "Low";
            let percent = 20;
            if (score >= 4) { level = "High"; percent = 80; }
            else if (score >= 2) { level = "Moderate"; percent = 50; }
            document.getElementById("riskR").innerHTML = `Risk: ${level}`;
            let bar = document.getElementById("riskBar");
            bar.style.width = percent + "%";
            bar.style.background = level == "High" ? "red" : level == "Moderate" ? "orange" : "green";
        }
        function calories() {
            let age = +document.getElementById("cAge").value;
            let act = +document.getElementById("activity").value;
            let gender = document.getElementById("genderC").value;
            let goal = document.getElementById("goal").value;
            let base = gender === "male" ? 1800 : 1500;
            let cal = Math.round(base * act);
            if (goal === "lose") cal -= 300;
            if (goal === "gain") cal += 300;
            document.getElementById("calValue").innerText = cal;
            document.getElementById("calR").innerText =
                goal.toUpperCase() + " PLAN: " + cal + " kcal/day";
            let circle = document.getElementById("calCircle");
            let offset = 314 - (cal / 3000) * 314;
            if (offset < 0) offset = 0;
            circle.style.strokeDashoffset = offset;
            let meals = document.getElementById("meals");
            if (goal === "lose") {
                meals.innerHTML = `
      <div class="meal">🥣 Oats + Fruits</div>
      <div class="meal">🥗 Salad Bowl</div>
      <div class="meal">🍵 Green Tea</div>
    `;
            }
            else if (goal === "gain") {
                meals.innerHTML = `
      <div class="meal">🍳 Eggs + Toast</div>
      <div class="meal">🍚 Rice + Chicken</div>
      <div class="meal">🥜 Nuts + Milk</div>
    `;
            }
            else {
                meals.innerHTML = `
      <div class="meal">🍞 Balanced Breakfast</div>
      <div class="meal">🍛 Normal Lunch</div>
      <div class="meal">🥛 Light Dinner</div>
    `;
            }
        }
        function water() {
            let age = +document.getElementById("wAge").value;
            let water = 2;
            if (age > 50) water = 1.8;
            if (age < 18) water = 1.5;
            document.getElementById("waterR").innerHTML = `Water Intake: ${water} - 2.5 Litres/day`;
        }
    </script>
</body>

</html>
